<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beneficiários</title>
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <h1>Beneficiários</h1>

<button id="btnNovoBeneficiario">
    Novo Beneficiário
</button>

<button id="btnAtualizarBeneficiarios">
    Atualizar Lista
</button>

<br><br>

<table border="1" width="100%" cellspacing="0" cellpadding="10">

    <thead>

        <tr>

            <th>ID</th>
            <th>Nome</th>
            <th>CPF</th>
            <th>Telefone</th>
            <th>Instituição</th>
            <th>Benefício</th>
            <th>Ativo</th>
            <th>Ações</th>

        </tr>

    </thead>

    <tbody id="tabelaBeneficiarios">

    </tbody>

</table>

<!-- ===========================
     MODAL
=========================== -->

<div
    id="modalBeneficiario"
    class="modal">

    <div class="modal-content">

        <h2 id="tituloModalBeneficiario">
            Novo Beneficiário
        </h2>

        <form id="formBeneficiario">

            <!-- ========================= -->
            <!-- DADOS PESSOAIS -->
            <!-- ========================= -->

            <h3 class="section-title">
                Dados Pessoais
            </h3>

            <div
                class="form-group full"
                id="grupoInstituicao"
                style="display:none;">

                <label for="instituicaoId">
                    Instituição
                </label>

                <select id="instituicaoId">

                    <option value="">
                        Selecione uma instituição
                    </option>

                </select>

            </div>

            <div class="form-grid">

                <div class="form-group full">

                    <label for="nomeCompleto">
                        Nome Completo
                    </label>

                    <input
                        type="text"
                        id="nomeCompleto"
                        required>

                </div>

                <div class="form-group">

                    <label for="cpf">
                        CPF
                    </label>

                    <input
                        type="text"
                        id="cpf"
                        required>

                </div>

                <div class="form-group">

                    <label for="dataNascimento">
                        Data de Nascimento
                    </label>

                    <input
                        type="date"
                        id="dataNascimento"
                        required>

                </div>

            </div>

            <!-- ========================= -->
            <!-- ENDEREÇO -->
            <!-- ========================= -->

            <h3 class="section-title">
                Endereço
            </h3>

            <div class="form-grid">

                <div class="form-group">

                    <label>CEP</label>

                    <input
                        type="text"
                        id="cep">

                </div>

                <div class="form-group">

                    <label>Cidade</label>

                    <input
                        type="text"
                        id="cidade"
                        required>

                </div>

                <div class="form-group full">

                    <label>Logradouro</label>

                    <input
                        type="text"
                        id="logradouro"
                        required>

                </div>

                <div class="form-group">

                    <label>Número</label>

                    <input
                        type="text"
                        id="numero"
                        required>

                </div>

                <div class="form-group">

                    <label>Complemento</label>

                    <input
                        type="text"
                        id="complemento">

                </div>

                <div class="form-group">

                    <label>Região</label>

                    <input
                        type="text"
                        id="regiao"
                        required>

                </div>

                <div class="form-group">

                    <label>UF</label>

                    <input
                        type="text"
                        maxlength="2"
                        id="uf"
                        required>

                </div>

            </div>

            <!-- ========================= -->
            <!-- CONTATO -->
            <!-- ========================= -->

            <h3 class="section-title">
                Contato
            </h3>

            <div class="form-grid">

                <div class="form-group">

                    <label>Telefone Principal</label>

                    <input
                        type="text"
                        id="telefonePrincipal"
                        required>

                </div>

                <div class="form-group">

                    <label>Telefone Secundário</label>

                    <input
                        type="text"
                        id="telefoneSecundario">

                </div>

                <div class="form-group full">

                    <label>Email</label>

                    <input
                        type="email"
                        id="email">

                </div>

            </div>

            <!-- ========================= -->
            <!-- BENEFÍCIO -->
            <!-- ========================= -->

            <h3 class="section-title">
                Benefício
            </h3>

            <div class="form-grid">

                <div class="form-group">

                    <label>Tipo de Benefício</label>

                    <select id="tipoBeneficio">

                        <option value="CESTA">CESTA</option>
                        <option value="GRANEL">GRANEL</option>
                        <option value="AMBOS">AMBOS</option>

                    </select>

                </div>

            </div>

            <!-- ========================= -->
            <!-- SITUAÇÃO -->
            <!-- ========================= -->

            <h3 class="section-title">
                Situação Socioeconômica
            </h3>

            <div class="form-group">

                <textarea
                    id="situacaoSocioeconomica"
                    rows="4"></textarea>

            </div>

            <!-- ========================= -->
            <!-- OBSERVAÇÕES -->
            <!-- ========================= -->

            <h3 class="section-title">
                Observações
            </h3>

            <div class="form-group">

                <textarea
                    id="observacoes"
                    rows="4"></textarea>

            </div>

            <div class="form-actions">

                <button type="submit">
                    💾 Salvar
                </button>

                <button
                    type="button"
                    id="btnFecharModal">

                    Cancelar

                </button>

            </div>

        </form>

    </div>

</div>

<script type="module" src="../js/beneficiarios.js"></script>

</body>
</html>
